variables:
  IMAGE: mcp-eddie
  REGISTRY: $CI_REGISTRY
  REGISTRY_USER: $CI_DEPLOY_USER
  REGISTRY_PASSWORD: $CI_DEPLOY_PASSWORD
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

stages:
  - build

build_and_push_image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  script:
    - export IMAGE_TAG=$([[ "$CI_COMMIT_TAG" =~ ^v ]] && echo "$CI_COMMIT_TAG" | sed 's/^v//' || echo "$CI_COMMIT_SHA")
    - docker buildx create --use || true
    - docker buildx build --push --platform linux/amd64,linux/arm64 --tag $CI_REGISTRY_IMAGE:$IMAGE_TAG --file ./Dockerfile .

  only:
    - main
    - master
    - ft-mcp-eddie
