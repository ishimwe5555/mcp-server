variables:
  IMAGE_NAME: $CI_IMAGE_NAME
  NEXUS_REGISTRY: $CI_NEXUS_REGISTRY
  NEXUS_REPOSITORY:  $CI_NEXUS_REPOSITORY

stages:
  - build

build_and_push_to_nexus:
  stage: build
  image: docker:latest
  tags:
    - shell-docker
  before_script:
    - echo $CONTAINER_IMAGE_REGISTRY_PASSWORD | docker login -u $CONTAINER_IMAGE_REGISTRY_USERNAME --password-stdin https://$NEXUS_REGISTRY
  script:
    - export IMAGE_TAG=$([[ "$CI_COMMIT_TAG" =~ ^v ]] && echo "$CI_COMMIT_TAG" | sed 's/^v//' || echo "$CI_COMMIT_SHA")
    - export IMAGE_FULL="${NEXUS_REGISTRY}/${NEXUS_REPOSITORY}/${IMAGE_NAME}"
    - |
      if docker manifest inspect ${IMAGE_FULL}:${IMAGE_TAG} > /dev/null 2>&1; then
        echo "Image already exists on Nexus: ${IMAGE_FULL}:${IMAGE_TAG}"
      else
        echo "Building new image: ${IMAGE_FULL}:${IMAGE_TAG}"
        docker build -f ./Dockerfile --ulimit nofile=65536:65536 --tag ${IMAGE_FULL}:${IMAGE_TAG} --build-arg REGISTRY="https://${NEXUS_REGISTRY}/" --platform linux/amd64 .
        docker push ${IMAGE_FULL}:${IMAGE_TAG}
      fi
  only:
    - main
    - tags